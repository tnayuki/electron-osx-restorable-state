name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Rebuild for Electron
        run: npx @electron/rebuild

      - name: Lint
        run: npm run lint

      - name: Run smoke tests
        run: npm test

      - name: Enable macOS State Restoration
        run: defaults write NSGlobalDomain NSQuitAlwaysKeepsWindows -bool true

      - name: Run E2E tests
        run: npm run test:e2e
